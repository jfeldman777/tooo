<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игра</title>
  <style>
    :root {
      --bg: #0f1114;
      --panel: #1a1d23;
      --border: #2e3340;
      --text: #e8eaf0;
      --muted: #8b929e;
      --ok: #3d9970;
      --bad: #c44;
      --accent: #5b8cde;
      --kbd-picto: 34px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, min(620px, 52vw)) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .game-stats {
      font-size: 0.9rem;
      color: #c5cad4;
      font-variant-numeric: tabular-nums;
    }
    .rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row-slot {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      user-select: none;
    }
    .row-slot:hover {
      border-color: var(--accent);
      background: #20242c;
    }
    .row-slot:active { transform: scale(0.99); }
    .row-slot.flash-ok {
      outline: 2px solid var(--ok);
      background: rgba(61, 153, 112, 0.12);
    }
    .row-slot.flash-bad {
      outline: 2px solid var(--bad);
    }
    .kbd-visual {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 6px;
      margin: 0;
      flex: 0 0 auto;
      width: fit-content;
      max-width: 56px;
      background: linear-gradient(180deg, #262b36 0%, #181b22 100%);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    .kbd-key {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
    }
    .kbd-square {
      width: var(--kbd-picto);
      height: var(--kbd-picto);
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }
    }
    .kbd-digit {
      font-size: 0.68rem;
      line-height: 1.1;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .thumbs {
      display: flex;
      flex-wrap: wrap;
      flex: 1 1 0;
      min-width: 0;
      gap: 6px;
      align-items: center;
      align-content: flex-start;
      min-height: 36px;
    }
    .thumbs .word-chip {
      justify-content: center;
      text-align: center;
      hyphens: auto;
    }
    .thumbs img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 6px;
      background: #0a0c0f;
      border: 1px solid #2a2f38;
      animation: thumbIn 0.45s ease;
    }
    @keyframes thumbIn {
      from { transform: scale(0.2); opacity: 0; }
      70% { transform: scale(1.08); opacity: 1; }
      to { transform: scale(1); opacity: 1; }
    }
    #stage {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 280px;
    }
    #current-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 520px;
      min-height: 200px;
    }
    #current-wrap.shake {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    #current-img {
      max-width: 100%;
      max-height: min(48vh, 420px);
      object-fit: contain;
      border-radius: 8px;
      background: #0a0c0f;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    #current-img.shrink-out {
      transform: scale(0.12);
      opacity: 0;
    }
    #current-img.stage-txt {
      background: #f3f4f8;
      padding: 14px 18px;
      border-radius: 10px;
      box-sizing: content-box;
      max-height: min(52vh, 480px);
    }
    #stage-text-card {
      display: none;
      background: #f3f4f8;
      color: #1a1f28;
      padding: 20px 24px;
      border-radius: 10px;
      font-size: 1.1rem;
      line-height: 1.45;
      text-align: center;
      max-width: min(440px, 100%);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      margin: 0 auto;
      word-wrap: break-word;
    }
    #stage-text-card:not([hidden]) {
      display: block;
    }
    .word-chip {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      max-width: 160px;
      padding: 5px 8px;
      background: #f3f4f8;
      color: #1a1f28;
      border-radius: 6px;
      font-size: 0.72rem;
      line-height: 1.25;
      border: 1px solid #c8ccd4;
      animation: thumbIn 0.45s ease;
    }
    #feedback {
      margin-top: 12px;
      min-height: 1.4em;
      font-size: 0.95rem;
      text-align: center;
    }
    #feedback.bad { color: #f48a8a; }
    #feedback.ok { color: #7dd4b0; }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    #overlay[hidden] { display: none !important; }
    .modal {
      background: #1c2028;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 400px;
      text-align: center;
    }
    .modal h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    .modal p { margin: 0 0 18px; color: var(--muted); font-size: 0.95rem; }
    .modal p[hidden] { display: none !important; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:hover { filter: brightness(1.08); }
    .empty-data {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      max-width: 480px;
      margin: 40px auto;
    }
  </style>
</head>
<body>
  <div id="no-data" class="empty-data" hidden>
    <p>Нет данных для игры. Добавьте папки <code>img_1</code>, <code>img_2</code>, … с PNG-файлами.
    Имя файла задаёт верную строку: <code>i3.png</code> или <code>3i.png</code> — строка 3.</p>
    <p>Запустите <code>build-game-data.ps1</code> или <code>launch.bat</code>.</p>
  </div>
  <main id="game-main" hidden>
    <div>
      <div class="meta game-stats" id="game-stats" aria-live="polite"></div>
      <div class="meta" id="level-meta"></div>
      <div class="rows" id="rows" aria-label="Выбор строки или клавиши 1–8"></div>
    </div>
    <div id="stage">
      <div id="current-wrap">
        <img id="current-img" alt="" />
        <div id="stage-text-card" hidden></div>
      </div>
      <div id="feedback" role="status"></div>
    </div>
  </main>
  <div id="overlay" hidden>
    <div class="modal">
      <h2 id="modal-title"></h2>
      <p id="modal-text"></p>
      <button type="button" class="primary" id="modal-btn">Далее</button>
    </div>
  </div>

  <script src="game-data.js"></script>
  <script>
    (function () {
      "use strict";

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      const levels = window.GAME_LEVELS;
      const noDataEl = document.getElementById("no-data");
      const mainEl = document.getElementById("game-main");
      const rowsEl = document.getElementById("rows");
      const levelMeta = document.getElementById("level-meta");
      const gameStats = document.getElementById("game-stats");
      const currentImg = document.getElementById("current-img");
      const currentWrap = document.getElementById("current-wrap");
      const stageTextCard = document.getElementById("stage-text-card");
      const feedback = document.getElementById("feedback");
      const overlay = document.getElementById("overlay");
      const modalTitle = document.getElementById("modal-title");
      const modalText = document.getElementById("modal-text");
      const modalBtn = document.getElementById("modal-btn");

      if (!Array.isArray(levels) || levels.length === 0) {
        noDataEl.hidden = false;
        return;
      }

      let wordGroups = [];

      function parseWordsText(raw) {
        const groups = [];
        const re = /\{([\s\S]*?)\}/g;
        let m;
        while ((m = re.exec(raw)) !== null) {
          const parts = m[1].split(",");
          const words = parts
            .map(function (s) {
              return s.replace(/\s+/g, " ").trim();
            })
            .filter(function (s) {
              return s.length > 0;
            });
          if (words.length === 8) {
            groups.push(words);
          }
        }
        return groups;
      }

      function getWordGroup(wi) {
        const g = wordGroups[wi];
        return Array.isArray(g) && g.length === 8 ? g : null;
      }

      let plan = [];
      let stepIndex = 0;
      let activeWordGroupIdx = null;
      let activePicsLevelIdx = null;

      function rebuildPlan() {
        plan.length = 0;
        const n = Math.max(wordGroups.length, levels.length);
        for (let i = 0; i < n; i++) {
          const wg = wordGroups[i];
          if (Array.isArray(wg) && wg.length === 8) {
            plan.push({ kind: "words", wordIdx: i });
          }
          const lv = levels[i];
          if (lv && Array.isArray(lv.images) && lv.images.length > 0) {
            plan.push({ kind: "pics", levelIdx: i });
          }
        }
      }

      function loadWordsThenStart() {
        fetch("txt2img/words.txt")
          .then(function (r) {
            if (!r.ok) {
              throw new Error("words");
            }
            return r.text();
          })
          .then(function (t) {
            wordGroups = parseWordsText(t);
          })
          .catch(function () {
            wordGroups = [];
          })
          .finally(function () {
            rebuildPlan();
            if (plan.length === 0) {
              noDataEl.hidden = false;
              return;
            }
            mainEl.hidden = false;
            resetSessionStats();
            stepIndex = 0;
            buildRows();
            startCurrentStep();
          });
      }
      let queue = [];
      let current = null;
      let busy = false;
      const rowThumbs = [];
      let phase = "labels";
      let txtLabelQueue = [];
      let txtLabelIndex = 0;
      let tasksDone = 0;
      let mistakeCount = 0;

      function updateGameStats() {
        gameStats.textContent =
          "Заданий: " + tasksDone + " · Ошибок: " + mistakeCount;
      }

      function resetSessionStats() {
        tasksDone = 0;
        mistakeCount = 0;
        updateGameStats();
      }

      function squareIconSrc(classNum) {
        return "_img_0/" + classNum + ".png";
      }
      function txt2imgIconSrc(classNum) {
        return "txt2img/" + classNum + "o.png";
      }

      function buildRows() {
        rowsEl.innerHTML = "";
        rowThumbs.length = 0;
        for (let c = 1; c <= 8; c++) {
          const slot = document.createElement("div");
          slot.className = "row-slot";
          slot.dataset.class = String(c);
          slot.setAttribute("role", "button");
          slot.setAttribute("tabindex", "0");
          slot.setAttribute("aria-label", "Клавиша " + c);
          const kbd = document.createElement("div");
          kbd.className = "kbd-visual";
          const keyCol = document.createElement("div");
          keyCol.className = "kbd-key";
          const keyImg = document.createElement("img");
          keyImg.className = "kbd-square";
          keyImg.src = squareIconSrc(c);
          keyImg.alt = "Подсказка " + c;
          const keyNum = document.createElement("span");
          keyNum.className = "kbd-digit";
          keyNum.textContent = String(c);
          keyCol.appendChild(keyImg);
          keyCol.appendChild(keyNum);
          kbd.appendChild(keyCol);
          const thumbs = document.createElement("div");
          thumbs.className = "thumbs";
          slot.appendChild(kbd);
          slot.appendChild(thumbs);
          rowsEl.appendChild(slot);
          rowThumbs[c] = thumbs;

          slot.addEventListener("click", function () {
            onPick(c);
          });
          slot.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              onPick(c);
            }
          });
        }
      }

      function folderPath(item) {
        const lv = levels[activePicsLevelIdx];
        return lv.folder + "/" + item.file;
      }

      function startCurrentStep() {
        if (stepIndex >= plan.length) {
          showGameEndKonets();
          return;
        }
        const step = plan[stepIndex];
        if (step.kind === "words") {
          startWordsPhase(step.wordIdx);
        } else {
          startPicsPhaseForLevel(step.levelIdx);
        }
      }

      function startWordsPhase(wi) {
        activeWordGroupIdx = wi;
        activePicsLevelIdx = null;
        phase = "labels";
        txtLabelQueue = shuffle([1, 2, 3, 4, 5, 6, 7, 8]);
        txtLabelIndex = 0;
        current = null;
        hideStageTextCard();
        showTxtChallenge();
      }

      function startPicsPhaseForLevel(li) {
        activeWordGroupIdx = null;
        activePicsLevelIdx = li;
        phase = "pics";
        const lv = levels[li];
        queue = shuffle(
          lv.images.map(function (x) {
            return { file: x.file, class: x.class };
          })
        );
        current = queue[0] || null;
        hideStageTextCard();
        currentImg.classList.remove("stage-txt");
        levelMeta.textContent =
          "Набор: " + lv.id + " · картинок: " + lv.images.length;
        showCurrent();
      }

      function hideStageTextCard() {
        stageTextCard.hidden = true;
        stageTextCard.textContent = "";
        currentImg.hidden = false;
      }

      function showCurrent() {
        feedback.textContent = "";
        feedback.className = "";
        hideStageTextCard();
        currentImg.classList.remove("stage-txt", "shrink-out");
        if (!current) {
          currentImg.removeAttribute("src");
          currentImg.alt = "";
          currentImg.removeAttribute("title");
          currentWrap.hidden = true;
          return;
        }
        currentWrap.hidden = false;
        currentImg.classList.remove("shrink-out");
        currentImg.src = folderPath(current);
        currentImg.alt = "";
        currentImg.removeAttribute("title");
      }

      function showTxtChallenge() {
        const c = txtLabelQueue[txtLabelIndex];
        const wg = getWordGroup(activeWordGroupIdx);
        feedback.textContent = "";
        feedback.className = "";
        currentWrap.hidden = false;
        currentImg.classList.remove("shrink-out");

        if (wg) {
          currentImg.removeAttribute("src");
          currentImg.alt = "";
          currentImg.removeAttribute("title");
          currentImg.classList.remove("stage-txt");
          currentImg.hidden = true;
          stageTextCard.hidden = false;
          stageTextCard.textContent = wg[c - 1];
        } else {
          hideStageTextCard();
          currentImg.classList.add("stage-txt");
          currentImg.src = txt2imgIconSrc(c);
          currentImg.alt = "";
          currentImg.removeAttribute("title");
        }

        levelMeta.textContent =
          "Шаг " +
          (txtLabelIndex + 1) +
          " из 8 — нажмите правильную клавишу";
      }

      function flashRow(classNum, ok) {
        const slot = rowsEl.querySelector('.row-slot[data-class="' + classNum + '"]');
        if (!slot) return;
        slot.classList.add(ok ? "flash-ok" : "flash-bad");
        setTimeout(function () {
          slot.classList.remove("flash-ok", "flash-bad");
        }, 450);
      }

      function onPickTxtPhase(chosen) {
        if (busy) return;
        const target = txtLabelQueue[txtLabelIndex];
        if (chosen !== target) {
          mistakeCount += 1;
          updateGameStats();
          feedback.textContent = "Не та клавиша — попробуйте ещё раз.";
          feedback.className = "bad";
          flashRow(chosen, false);
          currentWrap.classList.remove("shake");
          void currentWrap.offsetWidth;
          currentWrap.classList.add("shake");
          return;
        }

        feedback.textContent = "Верно!";
        feedback.className = "ok";
        flashRow(chosen, true);

        const wg = getWordGroup(activeWordGroupIdx);
        if (wg && wg[target - 1]) {
          const chip = document.createElement("span");
          chip.className = "word-chip";
          chip.textContent = wg[target - 1];
          rowThumbs[target].appendChild(chip);
        }

        tasksDone += 1;
        updateGameStats();
        txtLabelIndex += 1;

        if (txtLabelIndex >= txtLabelQueue.length) {
          stepIndex += 1;
          startCurrentStep();
        } else {
          showTxtChallenge();
        }
      }

      function onPick(chosen) {
        if (busy) return;
        if (chosen < 1 || chosen > 8) return;

        if (phase === "labels") {
          onPickTxtPhase(chosen);
          return;
        }

        if (!current) return;

        if (chosen === current.class) {
          busy = true;
          feedback.textContent = "Верно!";
          feedback.className = "ok";
          flashRow(chosen, true);

          currentImg.classList.add("shrink-out");
          window.setTimeout(function () {
            const thumb = document.createElement("img");
            thumb.src = folderPath(current);
            thumb.alt = current.file;
            rowThumbs[current.class].appendChild(thumb);

            queue.shift();
            current = queue[0] || null;
            currentImg.classList.remove("shrink-out");
            tasksDone += 1;
            updateGameStats();
            showCurrent();
            busy = false;

            if (!current) {
              stepIndex += 1;
              startCurrentStep();
            }
          }, 380);
        } else {
          mistakeCount += 1;
          updateGameStats();
          feedback.textContent = "Не та строка — попробуйте ещё раз.";
          feedback.className = "bad";
          flashRow(chosen, false);
          currentWrap.classList.remove("shake");
          void currentWrap.offsetWidth;
          currentWrap.classList.add("shake");
        }
      }

      function showGameEndKonets() {
        overlay.hidden = false;
        stageTextCard.hidden = true;
        stageTextCard.textContent = "";
        currentImg.removeAttribute("src");
        currentImg.alt = "";
        currentImg.removeAttribute("title");
        currentImg.hidden = false;
        currentImg.classList.remove("stage-txt", "shrink-out");
        currentWrap.hidden = true;
        modalTitle.textContent = "КОНЕЦ";
        modalText.textContent = "";
        modalText.hidden = true;
        modalBtn.textContent = "С начала";
        modalBtn.onclick = function () {
          overlay.hidden = true;
          modalText.hidden = false;
          currentWrap.hidden = false;
          feedback.textContent = "";
          feedback.className = "";
          busy = false;
          resetSessionStats();
          stepIndex = 0;
          buildRows();
          startCurrentStep();
        };
        mainEl.hidden = false;
      }

      document.addEventListener("keydown", function (e) {
        if (overlay.hidden === false) return;
        const n = parseInt(e.key, 10);
        if (n >= 1 && n <= 8) onPick(n);
      });

      loadWordsThenStart();
    })();
  </script>
</body>
</html>
