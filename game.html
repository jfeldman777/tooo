<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Угадай класс</title>
  <style>
    :root {
      --bg: #0f1114;
      --panel: #1a1d23;
      --border: #2e3340;
      --text: #e8eaf0;
      --muted: #8b929e;
      --ok: #3d9970;
      --bad: #c44;
      --accent: #5b8cde;
      --kbd-picto: 34px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, min(620px, 52vw)) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row-slot {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      user-select: none;
    }
    .row-slot:hover {
      border-color: var(--accent);
      background: #20242c;
    }
    .row-slot:active { transform: scale(0.99); }
    .row-slot.flash-ok {
      outline: 2px solid var(--ok);
      background: rgba(61, 153, 112, 0.12);
    }
    .row-slot.flash-bad {
      outline: 2px solid var(--bad);
    }
    .kbd-visual {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 6px;
      margin: 0;
      flex: 0 0 auto;
      width: fit-content;
      max-width: 146px;
      background: linear-gradient(180deg, #262b36 0%, #181b22 100%);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    .kbd-key {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
    }
    .kbd-square {
      width: var(--kbd-picto);
      height: var(--kbd-picto);
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
    }
    .kbd-txt2img {
      display: block;
      flex: 0 0 auto;
      height: var(--kbd-picto);
      width: auto;
      max-width: 100px;
      object-fit: contain;
      object-position: left center;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }
      .kbd-txt2img {
        max-width: 92px;
      }
    }
    .kbd-digit {
      font-size: 0.68rem;
      line-height: 1.1;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .thumbs {
      display: flex;
      flex-wrap: wrap;
      flex: 1 1 0;
      min-width: 0;
      gap: 6px;
      align-items: center;
      align-content: flex-start;
      min-height: 36px;
    }
    .thumbs img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 6px;
      background: #0a0c0f;
      border: 1px solid #2a2f38;
      animation: thumbIn 0.45s ease;
    }
    @keyframes thumbIn {
      from { transform: scale(0.2); opacity: 0; }
      70% { transform: scale(1.08); opacity: 1; }
      to { transform: scale(1); opacity: 1; }
    }
    #stage {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 280px;
    }
    #current-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 520px;
      min-height: 200px;
    }
    #current-wrap.shake {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    #current-img {
      max-width: 100%;
      max-height: min(48vh, 420px);
      object-fit: contain;
      border-radius: 8px;
      background: #0a0c0f;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    #current-img.shrink-out {
      transform: scale(0.12);
      opacity: 0;
    }
    #current-img.stage-txt {
      background: #f3f4f8;
      padding: 14px 18px;
      border-radius: 10px;
      box-sizing: content-box;
      max-height: min(52vh, 480px);
    }
    .kbd-txt2img.kbd-txt-hidden {
      visibility: hidden;
    }
    #feedback {
      margin-top: 12px;
      min-height: 1.4em;
      font-size: 0.95rem;
      text-align: center;
    }
    #feedback.bad { color: #f48a8a; }
    #feedback.ok { color: #7dd4b0; }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    #overlay[hidden] { display: none !important; }
    .modal {
      background: #1c2028;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 400px;
      text-align: center;
    }
    .modal h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    .modal p { margin: 0 0 18px; color: var(--muted); font-size: 0.95rem; }
    .modal p[hidden] { display: none !important; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:hover { filter: brightness(1.08); }
    .empty-data {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      max-width: 480px;
      margin: 40px auto;
    }
  </style>
</head>
<body>
  <div id="no-data" class="empty-data" hidden>
    <p>Нет данных для игры. Добавьте папки <code>img_1</code>, <code>img_2</code>, … с PNG-файлами.
    Имя файла задаёт верный класс: <code>i3.png</code> или <code>3i.png</code> — класс 3.</p>
    <p>Запустите <code>build-game-data.ps1</code> или <code>launch.bat</code>.</p>
  </div>
  <main id="game-main" hidden>
    <div>
      <div class="meta" id="level-meta"></div>
      <div class="rows" id="rows" aria-label="Выбор класса (строка 1–8)"></div>
    </div>
    <div id="stage">
      <div id="current-wrap">
        <img id="current-img" alt="Текущее изображение" />
      </div>
      <div id="feedback" role="status"></div>
    </div>
  </main>
  <div id="overlay" hidden>
    <div class="modal">
      <h2 id="modal-title"></h2>
      <p id="modal-text"></p>
      <button type="button" class="primary" id="modal-btn">Далее</button>
    </div>
  </div>

  <script src="game-data.js"></script>
  <script>
    (function () {
      "use strict";

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      const levels = window.GAME_LEVELS;
      const noDataEl = document.getElementById("no-data");
      const mainEl = document.getElementById("game-main");
      const rowsEl = document.getElementById("rows");
      const levelMeta = document.getElementById("level-meta");
      const currentImg = document.getElementById("current-img");
      const currentWrap = document.getElementById("current-wrap");
      const feedback = document.getElementById("feedback");
      const overlay = document.getElementById("overlay");
      const modalTitle = document.getElementById("modal-title");
      const modalText = document.getElementById("modal-text");
      const modalBtn = document.getElementById("modal-btn");

      if (!Array.isArray(levels) || levels.length === 0) {
        noDataEl.hidden = false;
        return;
      }

      let levelIndex = 0;
      let queue = [];
      let current = null;
      let busy = false;
      const rowThumbs = [];
      let rowTxtImgs = {};
      let phase = "labels";
      let txtLabelQueue = [];
      let txtLabelIndex = 0;
      function squareIconSrc(classNum) {
        return "_img_0/" + classNum + ".png";
      }
      function txt2imgIconSrc(classNum) {
        return "txt2img/" + classNum + "o.png";
      }

      function buildRows() {
        rowsEl.innerHTML = "";
        rowThumbs.length = 0;
        rowTxtImgs = {};
        for (let c = 1; c <= 8; c++) {
          const slot = document.createElement("div");
          slot.className = "row-slot";
          slot.dataset.class = String(c);
          slot.setAttribute("role", "button");
          slot.setAttribute("tabindex", "0");
          slot.setAttribute("aria-label", "Класс " + c + ", клавиша " + c);
          const kbd = document.createElement("div");
          kbd.className = "kbd-visual";
          const keyCol = document.createElement("div");
          keyCol.className = "kbd-key";
          const keyImg = document.createElement("img");
          keyImg.className = "kbd-square";
          keyImg.src = squareIconSrc(c);
          keyImg.alt = "Класс " + c + ", квадратная иконка";
          const keyNum = document.createElement("span");
          keyNum.className = "kbd-digit";
          keyNum.textContent = String(c);
          keyCol.appendChild(keyImg);
          keyCol.appendChild(keyNum);
          const t2i = document.createElement("img");
          t2i.className = "kbd-txt2img kbd-txt-hidden";
          t2i.src = txt2imgIconSrc(c);
          t2i.alt = "";
          rowTxtImgs[c] = t2i;
          kbd.appendChild(keyCol);
          kbd.appendChild(t2i);
          const thumbs = document.createElement("div");
          thumbs.className = "thumbs";
          slot.appendChild(kbd);
          slot.appendChild(thumbs);
          rowsEl.appendChild(slot);
          rowThumbs[c] = thumbs;

          slot.addEventListener("click", function () {
            onPick(c);
          });
          slot.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              onPick(c);
            }
          });
        }
      }

      function folderPath(item) {
        const lv = levels[levelIndex];
        return lv.folder + "/" + item.file;
      }

      function showCurrent() {
        feedback.textContent = "";
        feedback.className = "";
        currentImg.classList.remove("stage-txt", "shrink-out");
        if (!current) {
          currentImg.removeAttribute("src");
          return;
        }
        currentImg.classList.remove("shrink-out");
        currentImg.src = folderPath(current);
      }

      function showTxtChallenge() {
        const c = txtLabelQueue[txtLabelIndex];
        feedback.textContent = "";
        feedback.className = "";
        currentImg.classList.remove("shrink-out");
        currentImg.classList.add("stage-txt");
        currentImg.src = txt2imgIconSrc(c);
        currentImg.alt = "Подпись " + c;
        levelMeta.textContent =
          "Сначала подписи: " +
          (txtLabelIndex + 1) +
          " из 8 — нажмите клавишу с такой же подписью";
      }

      function startLevel(idx) {
        levelIndex = idx;
        const lv = levels[levelIndex];
        if (!lv || !lv.images || lv.images.length === 0) {
          showGameEndKonets();
          return;
        }
        buildRows();
        queue = shuffle(lv.images.map(function (x) {
          return { file: x.file, class: x.class };
        }));
        current = null;
        phase = "labels";
        txtLabelQueue = shuffle([1, 2, 3, 4, 5, 6, 7, 8]);
        txtLabelIndex = 0;
        showTxtChallenge();
      }

      function beginPicsPhase(lv) {
        phase = "pics";
        currentImg.classList.remove("stage-txt");
        levelMeta.textContent =
          "Набор: " + lv.id + " · картинок: " + lv.images.length;
        current = queue[0] || null;
        showCurrent();
      }

      function flashRow(classNum, ok) {
        const slot = rowsEl.querySelector('.row-slot[data-class="' + classNum + '"]');
        if (!slot) return;
        slot.classList.add(ok ? "flash-ok" : "flash-bad");
        setTimeout(function () {
          slot.classList.remove("flash-ok", "flash-bad");
        }, 450);
      }

      function onPickTxtPhase(chosen) {
        if (busy) return;
        const target = txtLabelQueue[txtLabelIndex];
        if (chosen !== target) {
          feedback.textContent =
            "Не та клавиша — найдите ту, что совпадает с подписью на экране.";
          feedback.className = "bad";
          flashRow(chosen, false);
          currentWrap.classList.remove("shake");
          void currentWrap.offsetWidth;
          currentWrap.classList.add("shake");
          return;
        }

        feedback.textContent = "Верно!";
        feedback.className = "ok";
        flashRow(chosen, true);

        const t2 = rowTxtImgs[target];
        if (t2) {
          t2.classList.remove("kbd-txt-hidden");
        }

        txtLabelIndex += 1;
        const lv = levels[levelIndex];

        if (txtLabelIndex >= txtLabelQueue.length) {
          beginPicsPhase(lv);
        } else {
          showTxtChallenge();
        }
      }

      function onPick(chosen) {
        if (busy) return;
        if (chosen < 1 || chosen > 8) return;

        if (phase === "labels") {
          onPickTxtPhase(chosen);
          return;
        }

        if (!current) return;

        if (chosen === current.class) {
          busy = true;
          feedback.textContent = "Верно!";
          feedback.className = "ok";
          flashRow(chosen, true);

          currentImg.classList.add("shrink-out");
          window.setTimeout(function () {
            const thumb = document.createElement("img");
            thumb.src = folderPath(current);
            thumb.alt = current.file;
            rowThumbs[current.class].appendChild(thumb);

            queue.shift();
            current = queue[0] || null;
            currentImg.classList.remove("shrink-out");
            showCurrent();
            busy = false;

            if (!current) {
              const next = levelIndex + 1;
              if (next < levels.length) {
                overlay.hidden = false;
                modalText.hidden = false;
                modalTitle.textContent = "Набор «" + levels[levelIndex].id + "» завершён";
                modalText.textContent = "Переходим к следующему набору.";
                modalBtn.textContent = "Далее";
                modalBtn.onclick = function () {
                  overlay.hidden = true;
                  startLevel(next);
                };
              } else {
                showGameEndKonets();
              }
            }
          }, 380);
        } else {
          feedback.textContent = "Не та строка — попробуйте ещё раз.";
          feedback.className = "bad";
          flashRow(chosen, false);
          currentWrap.classList.remove("shake");
          void currentWrap.offsetWidth;
          currentWrap.classList.add("shake");
        }
      }

      function showGameEndKonets() {
        overlay.hidden = false;
        modalTitle.textContent = "КОНЕЦ";
        modalText.textContent = "";
        modalText.hidden = true;
        modalBtn.textContent = "С начала";
        modalBtn.onclick = function () {
          overlay.hidden = true;
          modalText.hidden = false;
          feedback.textContent = "";
          feedback.className = "";
          busy = false;
          startLevel(0);
        };
        mainEl.hidden = false;
      }

      document.addEventListener("keydown", function (e) {
        if (overlay.hidden === false) return;
        const n = parseInt(e.key, 10);
        if (n >= 1 && n <= 8) onPick(n);
      });

      mainEl.hidden = false;
      startLevel(0);
    })();
  </script>
</body>
</html>
